[tool.uv.workspace]
members = ["axiom-*", "oltp/axiom-*", "olap/axiom-*"]

[dependency-groups]
dev = [
    "mypy>=1.16.0,<2",
    "pip-audit>=2.9.0,<3",
    "pre-commit>=4.2.0,<5",
    "pylint>=3.3.0,<4",
    "ruff>=0.11.13,<=0.12.0",
    "vulture>=2.15",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    "W",
    # pyflakes
    "F",
    # pydocstyle
    "D",
    # isort
    "I",
    # tidy imports
    "TID",
    # flake8-bugbear
    "B",
    # flake8-bandit
    "S",
    # pyugrade
    "UP",
]
ignore = ["B008", "E721"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.pycodestyle]
max-doc-length = 120
max-line-length = 120

[tool.ruff.lint.per-file-ignores]
"*/tests/*" = ["S101", "D"]

[tool.ruff.lint.isort]
known-first-party = ["axiom"]

[tool.ruff.format]
docstring-code-format = true
