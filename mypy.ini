[mypy]
strict = true
pretty = true
show_error_codes = true
disable_error_code = empty-body,no-any-return,import-untyped
explicit_package_bases = true
mypy_path =
    axiom-auth/src
    axiom-cache/src
    axiom-core/src
    axiom-email/src
    axiom-fastapi/src
    axiom-objectstore/src
    axiom-queue/src
    axiom-redis/src
    axiom-serialization/src
    axiom-task/src
    olap/axiom-clickhouse/src
    olap/axiom-opensearch/src
    oltp/axiom-beanie/src
    oltp/axiom-sqlalchemy/src

show_column_numbers = true

check_untyped_defs = true

warn_return_any = true
warn_unused_ignores = true
warn_unreachable = true
warn_no_return = true

disallow_untyped_calls = true
disallow_incomplete_defs = true
disallow_subclassing_any = true
