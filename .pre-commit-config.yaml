repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-ast
      - id: trailing-whitespace
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer

  - repo: https://github.com/asottile/add-trailing-comma
    rev: v4.0.0
    hooks:
      - id: add-trailing-comma

  # Temporarily disabled: use Ruff for docstring checks instead
  # - repo: https://github.com/PyCQA/pydocstyle
  #   rev: 6.3.0
  #   hooks:
  #     - id: pydocstyle
  #       exclude: '(^\.venv/|/tests/)'

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        exclude: '(^\.venv/|/tests/)'
        args:
          - --exclude
          - scripts/check_ignored_cves.py

  - repo: https://github.com/pypa/pip-audit
    rev: v2.10.0
    hooks:
      - id: pip-audit

  - repo: local
    hooks:
      - id: ruff-format
        name: Format code with Ruff
        entry: uv run ruff format
        language: system
        types: [ python ]

      - id: ruff-fix
        name: Fix linting issues with Ruff
        entry: uv run ruff check
        language: system
        types: [ python ]
        args:
          - --fix

      - id: ruff-lint
        name: Check lint with Ruff
        entry: uv run ruff check
        language: system
        types: [ python ]

      - id: mypy
        name: Validate types with MyPy
        entry: python scripts/check_types.py
        language: system
        types: [ python ]
        pass_filenames: false
        require_serial: true
